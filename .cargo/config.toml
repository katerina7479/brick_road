# `cargo dev` = `cargo run --features dev` (enables bevy/dynamic_linking)
[alias]
dev = "run --features dev"

# ── Fast linker (Apple Silicon) ───────────────────────────────────────────────
# Install: brew install llvm
# Then uncomment:
# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]

# ── Fast linker (Linux / CI) ──────────────────────────────────────────────────
# Install: apt install mold  OR  brew install mold
# Then uncomment:
# [target.x86_64-unknown-linux-gnu]
# linker = "clang"
# rustflags = ["-C", "link-arg=-fuse-ld=mold"]
